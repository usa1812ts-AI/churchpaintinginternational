  <title>KS Running Team – Firmenlauf 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold-deep:    #8a6020;
      --gold-mid:     #b8893a;
      --gold-warm:    #c9a04e;
      --gold-light:   #e2c87a;
      --gold-pale:    #f0dfa0;
      --bg-dark:      #2a1f0a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Oswald', sans-serif;
      background: var(--bg-dark);
      color: var(--gold-pale);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, #6b4a18 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 20% 80%, #4a3210 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 80% 70%, #5a3e14 0%, transparent 50%),
        linear-gradient(160deg, #2a1f0a 0%, #1a1205 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px; pointer-events: none; z-index: 1;
    }
    .container {
      position: relative; z-index: 2; width: 100%; max-width: 420px;
      padding: 16px 24px 28px; display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }
    .deco-line {
      width: 100%; display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; opacity: 0; animation: fadeUp 0.8s 0.1s forwards;
    }
    .deco-line::before, .deco-line::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
    }
    .deco-diamond { width: 8px; height: 8px; background: var(--gold-warm); transform: rotate(45deg); flex-shrink: 0; }
    .logo-ring {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid var(--gold-mid); display: flex;
      align-items: center; justify-content: center;
      position: relative; margin-bottom: 16px;
      opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
      box-shadow: 0 0 0 6px rgba(184,137,58,0.08), 0 0 0 12px rgba(184,137,58,0.04), inset 0 0 30px rgba(184,137,58,0.1);
      overflow: hidden;
    }
    .logo-ring::before {
      content: ''; position: absolute; inset: 5px; border-radius: 50%;
      border: 1px solid rgba(184,137,58,0.3); z-index: 2; pointer-events: none;
    }
    .logo-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .team-name { text-align: center; opacity: 0; animation: fadeUp 0.8s 0.35s forwards; margin-bottom: 4px; }
    .team-name .running {
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-pale); line-height: 1.1;
    }
    .team-name .firm {
      font-family: 'Crimson Pro', serif; font-style: italic; font-weight: 300;
      font-size: 13px; color: var(--gold-mid); letter-spacing: 0.06em; margin-top: 3px;
    }
    .event-label {
      font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 11px;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-mid);
      margin: 18px 0 5px; opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
    }
    .event-title {
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px;
      letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold-pale);
      text-align: center; opacity: 0; animation: fadeUp 0.8s 0.6s forwards; line-height: 1.1;
    }
    .date-strip {
      display: flex; align-items: center; gap: 10px; margin: 7px 0 22px;
      opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
    }
    .date-strip span { font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--gold-warm); letter-spacing: 0.05em; }
    .date-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold-deep); }
    .countdown-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      width: 100%; opacity: 0; animation: fadeUp 0.8s 0.85s forwards;
    }
    .unit-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.15) 100%);
      border: 1px solid rgba(184,137,58,0.25); border-radius: 8px;
      padding: 14px 4px 10px; display: flex; flex-direction: column;
      align-items: center; gap: 5px; position: relative; overflow: hidden;
    }
    .unit-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-warm), transparent); opacity: 0.5;
    }
    .unit-number {
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 38px;
      line-height: 1; color: var(--gold-pale); letter-spacing: -0.01em;
      transition: transform 0.12s ease; min-width: 2ch; text-align: center;
    }
    .unit-number.tick { transform: scale(1.06); }
    .unit-label { font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-mid); }
    .motto {
      margin-top: 20px; font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 13px; color: var(--gold-mid); text-align: center;
      opacity: 0; animation: fadeUp 0.8s 1.05s forwards; letter-spacing: 0.12em;
    }
    .finished-msg { display: none; text-align: center; }
    .finished-msg .big { font-size: 48px; font-weight: 700; color: var(--gold-pale); }
    .finished-msg .sub { font-family: 'Crimson Pro', serif; font-style: italic; font-size: 18px; color: var(--gold-warm); margin-top: 8px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { text-shadow: 0 0 8px rgba(226,200,122,0.4); } 50% { text-shadow: 0 0 22px rgba(226,200,122,0.9); } }
    .glowing .unit-number { animation: pulseGlow 1.8s ease-in-out infinite; }
    .install-hint {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 12px);
      left: 50%; transform: translateX(-50%);
      font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 10px;
      letter-spacing: 0.15em; text-transform: uppercase; color: rgba(184,137,58,0.3);
      white-space: nowrap; z-index: 10;
    }
  </style>
</head>

<script>
  const TARGET = new Date('2026-05-13T19:00:00');
  function pad(n) { return String(n).padStart(2, '0'); }
  function update() {
    const diff = TARGET - new Date();
    if (diff <= 0) {
      document.getElementById('cdGrid').style.display = 'none';
      document.getElementById('finishedMsg').style.display = 'block';
      document.getElementById('motto').textContent = '#churchpaintinginternational 🏅';
      return;
    }
    const s = Math.floor(diff / 1000);
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600),
          m = Math.floor((s % 3600) / 60), sec = s % 60;
    const setVal = (id, val) => {
      const el = document.getElementById(id), nv = pad(val);
      if (el.textContent !== nv) {
        el.textContent = nv; el.classList.remove('tick');
        void el.offsetWidth; el.classList.add('tick');
        setTimeout(() => el.classList.remove('tick'), 150);
      }
    };
    setVal('days', d); setVal('hours', h); setVal('mins', m); setVal('secs', sec);
    if (d < 1) document.getElementById('cdGrid').classList.add('glowing');
  }
  update(); setInterval(update, 1000);
</script>
